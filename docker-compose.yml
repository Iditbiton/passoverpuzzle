version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: seder-order-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: seder_order
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

